app = "freeassist-mlflow"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/api/2.0/mlflow/experiments/search?max_results=1"
    timeout = "15s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "freeassist_mlflow_data"
  destination = "/mlflow/tracking"
  initial_size = "3gb"
